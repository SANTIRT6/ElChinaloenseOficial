<nav class="navbar">

  <div class="logo">
    🦐 El Chinaloense Oficial
  </div>

  <div class="nav-links">

    <a routerLink="/">Inicio</a>
    <a routerLink="/menu">Menú</a>

    <!-- BOTON ADMIN -->
    <a routerLink="/admin" *ngIf="esAdmin()">Panel Admin</a>

    <a routerLink="/mis-pedidos">Mis pedidos</a>

    <a routerLink="/carrito" class="carrito">
      🛒 Carrito
      <span class="contador" *ngIf="totalItems > 0">
        {{ totalItems }}
      </span>
    </a>

    <!-- SALUDO -->
    <span *ngIf="estaLogueado()" class="usuario">
      👤 Hola, {{ getUsuario()?.nombre }}
    </span>

    <!-- LOGIN -->
    <a routerLink="/login" *ngIf="!estaLogueado()">Iniciar Sesión</a>
    <a routerLink="/registro" *ngIf="!estaLogueado()">Registro</a>

    <!-- LOGOUT -->
    <a (click)="logout()" *ngIf="estaLogueado()" style="cursor:pointer">
      Cerrar sesión
    </a>

  </div>

</nav>
