<h1>Pedidos del restaurante</h1>

<div *ngFor="let pedido of pedidos" class="pedido-admin">

<h3>Pedido #{{pedido.id}}</h3>

<p>Total: ${{pedido.total}}</p>

<p [ngClass]="'estado-' + pedido.estado">
Estado: {{pedido.estado}}
</p>

<select (change)="cambiarEstado(pedido.id, $any($event.target).value)">

<option value="pendiente">Pendiente</option>
<option value="preparando">Preparando</option>
<option value="listo">Listo</option>
<option value="entregado">Entregado</option>

</select>

<h4>Productos</h4>

<ul>

<li *ngFor="let p of pedido.productos">

<b>{{p.nombre}}</b> - ${{p.precioFinal || p.precio}}

<!-- INGREDIENTES QUITADOS -->
<div *ngIf="p.ingredientesQuitados?.length > 0">

<p><b>Sin:</b></p>

<ul>
<li *ngFor="let ing of p.ingredientesQuitados">
{{ing}}
</li>
</ul>

</div>

<!-- EXTRAS -->
<div *ngIf="p.extrasSeleccionados?.length > 0">

<p><b>Extras:</b></p>

<ul>
<li *ngFor="let e of p.extrasSeleccionados">
{{e.nombre}} (+ ${{e.precio}})
</li>
</ul>

</div>

</li>

</ul>

</div>
