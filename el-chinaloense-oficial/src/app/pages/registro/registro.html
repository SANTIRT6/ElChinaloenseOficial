<div class="registro-container">

  <div class="registro-card">

    <h2>Crear cuenta</h2>

    <input
      type="text"
      placeholder="Nombre"
      [(ngModel)]="nombre"
    >

    <input
      type="email"
      placeholder="Correo electrónico"
      [(ngModel)]="email"
    >

    <input
      type="password"
      placeholder="Contraseña"
      [(ngModel)]="password"
    >

    <button (click)="registrar()" class="btn-crear">
      Crear cuenta
    </button>

    <p class="login-link">
      ¿Ya tienes cuenta?
      <a routerLink="/login">Iniciar sesión</a>
    </p>

  </div>

</div>
