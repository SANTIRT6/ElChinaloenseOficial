<div class="container">

  <div class="card">

    <h2>Iniciar sesión</h2>

    <input
      type="email"
      placeholder="Correo electrónico"
      [(ngModel)]="email"
    >

    <input
      type="password"
      placeholder="Contraseña"
      [(ngModel)]="password"
    >

    <button (click)="login()">
      Iniciar sesión
    </button>

    <p class="info">
      Inicia sesión para realizar pedidos y consultar el estado de tus compras.
    </p>

    <p class="registro">
      ¿No tienes cuenta?
      <a routerLink="/registro">Crear cuenta</a>
    </p>

  </div>

</div>
